<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --accent: #58a6ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #111827 0%, #0b1223 100%);
      color: var(--text);
      padding: 20px;
    }

    .container {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .header h1 {
      font-size: 2rem;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .header p {
      color: #9bb3cf;
      line-height: 1.6;
    }

    .card {
      display: grid;
      gap: 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 1.75rem;
      border-radius: 24px;
    }

    .field {
      display: grid;
      gap: 0.5rem;
    }

    .field label {
      font-size: 0.95rem;
      color: #bac8e0;
    }

    .field input {
      width: 100%;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.14);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: center;
    }

    .button {
      flex: 1 1 180px;
      padding: 0.95rem 1rem;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.calculate {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 18px 30px rgba(88, 166, 255, 0.3);
    }

    .button.reset {
      background: transparent;
      color: #9bb3cf;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .result-box {
      padding: 1.3rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      min-height: 112px;
    }

    .result-box h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: #cdd9e5;
    }

    .result {
      font-size: clamp(1.75rem, 2vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .category {
      color: #9bb3cf;
      line-height: 1.5;
    }

    .hint {
      margin-top: 1rem;
      color: #7b8ca0;
      font-size: 0.95rem;
      text-align: center;
    }

    @media (max-width: 420px) {
      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <section class="container">
    <header class="header">
      <h1>BMI Calculator</h1>
      <p>Enter your weight and height to find your Body Mass Index instantly.</p>
    </header>

    <div class="card">
      <div class="field">
        <label for="weight">Weight (kg)</label>
        <input id="weight" type="number" min="1" step="0.1" placeholder="e.g. 72" />
      </div>

      <div class="field">
        <label for="height">Height (cm)</label>
        <input id="height" type="number" min="1" step="0.1" placeholder="e.g. 175" />
      </div>

      <div class="actions">
        <button class="button calculate" id="calculateBtn" type="button">Calculate BMI</button>
        <button class="button reset" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="result-box" id="resultBox">
        <h2>Your Result</h2>
        <div class="result" id="bmiValue">--</div>
        <div class="category" id="bmiCategory">Fill in your weight and height above.</div>
      </div>
    </div>

    <p class="hint">BMI = weight ÷ (height × height) × 10,000. A healthy BMI is usually between 18.5 and 24.9.</p>
  </section>

  <script>
    const weightInput = document.getElementById('weight');
    const heightInput = document.getElementById('height');
    const calculateBtn = document.getElementById('calculateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const bmiValue = document.getElementById('bmiValue');
    const bmiCategory = document.getElementById('bmiCategory');

    function getCategory(bmi) {
      if (bmi < 18.5) return 'Underweight';
      if (bmi < 25) return 'Normal weight';
      if (bmi < 30) return 'Overweight';
      return 'Obesity';
    }

    function formatNumber(value) {
      return value.toFixed(1);
    }

    calculateBtn.addEventListener('click', () => {
      const weight = parseFloat(weightInput.value);
      const heightCm = parseFloat(heightInput.value);

      if (!weight || !heightCm || weight <= 0 || heightCm <= 0) {
        bmiValue.textContent = '--';
        bmiCategory.textContent = 'Please enter valid weight and height values.';
        return;
      }

      const heightInMeters = heightCm / 100;
      const bmi = weight / (heightInMeters * heightInMeters);
      bmiValue.textContent = formatNumber(bmi);
      bmiCategory.textContent = getCategory(bmi);
    });

    resetBtn.addEventListener('click', () => {
      weightInput.value = '';
      heightInput.value = '';
      bmiValue.textContent = '--';
      bmiCategory.textContent = 'Fill in your weight and height above.';
      weightInput.focus();
    });
  </script>
</body>
</html>
